# CI Workflow - Build and Test Electron Application
# Triggers: Push to main/develop branches
# Purpose: Validate code quality and build (unsigned installer for testing)

name: CI - Build and Test

permissions:
  contents: read

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Additional steps will be added in Phase 4 (US2)
    # - Type check
    # - Lint
    # - Tests
    # - Build
    # - Package (unsigned)
    # - Upload artifacts
