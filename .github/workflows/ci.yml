# CI Workflow - Build and Test Electron Application
# Triggers: Push to main/develop branches
# Purpose: Validate code quality and build (unsigned installer for testing)

name: CI - Build and Test

permissions:
  contents: read

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npm run type-check

    - name: Lint code
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build application
      run: npm run build

    - name: Package installer (unsigned)
      run: npx electron-builder --publish never
      env:
        # Skip code signing in CI builds
        CSC_IDENTITY_AUTO_DISCOVERY: false

    - name: List build artifacts
      run: |
        Write-Host "Build artifacts in dist/:" -ForegroundColor Cyan
        Get-ChildItem dist/ -Recurse | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
          $size = [math]::Round($_.Length / 1MB, 2)
          Write-Host "  $($_.Name) - ${size} MB" -ForegroundColor Gray
        }
      shell: pwsh

    - name: Upload unsigned installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: markread-installer-unsigned-${{ github.sha }}
        path: |
          dist/*.exe
          dist/*.blockmap
          dist/latest.yml
        if-no-files-found: error
        retention-days: 30

    - name: Build summary
      run: |
        Write-Host "`n✓ CI Build completed successfully!" -ForegroundColor Green
        Write-Host "`nQuality Checks:" -ForegroundColor Cyan
        Write-Host "  ✓ Type check passed" -ForegroundColor Gray
        Write-Host "  ✓ Linting passed" -ForegroundColor Gray
        Write-Host "  ✓ Tests passed" -ForegroundColor Gray
        Write-Host "  ✓ Build succeeded" -ForegroundColor Gray
        Write-Host "`nNote: This is an unsigned build for testing purposes only." -ForegroundColor Yellow
        Write-Host "Signed releases are created when version tags are pushed." -ForegroundColor Yellow
      shell: pwsh
