# Release Workflow - Build, Sign, and Publish Electron Application
# Triggers: Push tags matching v*.*.*
# Purpose: Create signed installers and publish to GitHub Releases

name: Release - Build, Sign, and Publish

permissions:
  contents: write  # Required for creating releases

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.5.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Additional steps will be added in subsequent phases:
    # Phase 4 (US2):
    # - Version validation
    # - Type check
    # - Lint
    # - Tests
    # - Build
    # - Package (unsigned initially)
    # - Upload artifacts
    # - Create GitHub Release
    #
    # Phase 5 (US3):
    # - Certificate expiration check
    # - Sign installer
    # - Verify signature
