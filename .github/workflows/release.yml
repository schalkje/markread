# Release Workflow - Build, Sign, and Publish Electron Application
# Triggers: Push tags matching v*.*.*
# Purpose: Create signed installers and publish to GitHub Releases

name: Release - Build, Sign, and Publish

permissions:
  contents: write  # Required for creating releases

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.5.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Validate version match
      run: |
        # Extract version from tag (v0.5.1 -> 0.5.1)
        $tag = "${{ github.ref_name }}"
        if ($tag -match '^v(.+)$') {
          $tagVersion = $matches[1]
        } else {
          throw "Tag '$tag' does not match expected format 'v*.*.*'"
        }

        # Read version from package.json
        $packageJson = Get-Content "package.json" -Raw | ConvertFrom-Json
        $pkgVersion = $packageJson.version

        Write-Host "Tag version: $tagVersion" -ForegroundColor Cyan
        Write-Host "package.json version: $pkgVersion" -ForegroundColor Cyan

        if ($tagVersion -ne $pkgVersion) {
          Write-Host "❌ Version mismatch!" -ForegroundColor Red
          Write-Host "Tag version ($tagVersion) does not match package.json version ($pkgVersion)" -ForegroundColor Red
          throw "Version mismatch: tag=$tagVersion, package.json=$pkgVersion"
        }

        Write-Host "✓ Version validation passed" -ForegroundColor Green
      shell: pwsh

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npm run type-check

    - name: Lint code
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build application
      run: npm run build

    - name: Decode certificate
      run: |
        if ($env:CERT_PFX) {
          Write-Host "Decoding certificate from CERT_PFX secret..." -ForegroundColor Cyan
          $pfxBytes = [System.Convert]::FromBase64String($env:CERT_PFX)
          $pfxPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          Write-Host "✓ Certificate decoded to: $pfxPath" -ForegroundColor Green
          "PFX_PATH=$pfxPath" >> $env:GITHUB_ENV
          "PFX_PASSWORD=$env:CERT_PASSWORD" >> $env:GITHUB_ENV
        } else {
          Write-Host "No CERT_PFX secret found, skipping certificate decode" -ForegroundColor Gray
        }
      shell: pwsh
      env:
        CERT_PFX: ${{ secrets.CERT_PFX }}
        CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}

    - name: Check certificate configuration
      run: |
        Write-Host "Checking certificate configuration..." -ForegroundColor Cyan

        # Check if signing is configured (PFX_PATH set by decode step or CERT_THUMBPRINT from secrets)
        if ($env:PFX_PATH -or $env:CERT_THUMBPRINT) {
          Write-Host "✓ Code signing is ENABLED" -ForegroundColor Green
          if ($env:PFX_PATH) {
            Write-Host "  Certificate source: PFX file" -ForegroundColor Gray
          } elseif ($env:CERT_THUMBPRINT) {
            Write-Host "  Certificate source: Windows Store" -ForegroundColor Gray
          }
          Write-Host "  Note: Detailed expiration check happens during signing" -ForegroundColor Gray
        } else {
          Write-Host "⚠ Code signing is DISABLED (no certificate configured)" -ForegroundColor Yellow
          Write-Host "  Installers will be unsigned" -ForegroundColor Yellow
        }
      shell: pwsh
      env:
        CERT_THUMBPRINT: ${{ secrets.CERT_THUMBPRINT }}

    - name: Package installer
      run: npm run package
      env:
        # Code signing environment variables (set by decode step or from secrets)
        CERT_THUMBPRINT: ${{ secrets.CERT_THUMBPRINT }}
        TIMESTAMP_SERVER: http://timestamp.digicert.com
        # GitHub token for electron-builder publishing
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: List release artifacts
      id: list-artifacts
      run: |
        Write-Host "Release artifacts in dist/:" -ForegroundColor Cyan
        Get-ChildItem dist/ -Recurse | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
          $size = [math]::Round($_.Length / 1MB, 2)
          Write-Host "  $($_.Name) - ${size} MB" -ForegroundColor Gray
        }

        # Find installer and portable exe
        $installer = Get-ChildItem dist/*.exe | Where-Object { $_.Name -match 'Setup' } | Select-Object -First 1
        $portable = Get-ChildItem dist/*.exe | Where-Object { $_.Name -match 'portable' } | Select-Object -First 1

        if ($installer) {
          "installer-name=$($installer.Name)" >> $env:GITHUB_OUTPUT
          "installer-path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
        }

        if ($portable) {
          "portable-name=$($portable.Name)" >> $env:GITHUB_OUTPUT
          "portable-path=$($portable.FullName)" >> $env:GITHUB_OUTPUT
        }
      shell: pwsh

    - name: Verify signatures
      run: |
        # Check if signing was enabled
        if ($env:PFX_PATH -or $env:CERT_THUMBPRINT) {
          Write-Host "Verifying installer signatures..." -ForegroundColor Cyan

          # Verify installer
          $installer = Get-ChildItem dist/*.exe | Where-Object { $_.Name -match 'Setup' } | Select-Object -First 1
          if ($installer) {
            Write-Host "Verifying: $($installer.Name)" -ForegroundColor Gray
            .\scripts\electron-sign.ps1 -Path $installer.FullName -Verify
          }

          # Verify portable exe
          $portable = Get-ChildItem dist/*.exe | Where-Object { $_.Name -match 'portable' } | Select-Object -First 1
          if ($portable) {
            Write-Host "Verifying: $($portable.Name)" -ForegroundColor Gray
            .\scripts\electron-sign.ps1 -Path $portable.FullName -Verify
          }

          Write-Host "✓ All signatures verified successfully" -ForegroundColor Green
        } else {
          Write-Host "⚠ Skipping signature verification (installers are unsigned)" -ForegroundColor Yellow
        }
      shell: pwsh
      env:
        CERT_THUMBPRINT: ${{ secrets.CERT_THUMBPRINT }}

    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: markread-release-${{ github.ref_name }}
        path: |
          dist/*.exe
          dist/*.blockmap
          dist/latest.yml
        if-no-files-found: error
        retention-days: 90

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*.exe
          dist/*.blockmap
          dist/latest.yml
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        generate_release_notes: true
        fail_on_unmatched_files: true
        body: |
          ## 🎉 MarkRead ${{ github.ref_name }}

          ### 📦 Installation

          **NSIS Installer (Recommended)**
          - Download `${{ steps.list-artifacts.outputs.installer-name }}`
          - Run the installer and follow the wizard
          - Automatic updates enabled
          - Digitally signed for Windows SmartScreen compatibility

          **Portable Version**
          - Download `${{ steps.list-artifacts.outputs.portable-name }}`
          - Run from any location without installation
          - No registry modifications
          - Also digitally signed for security

          ### 📝 What's Changed
          See below for automatically generated release notes.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Release summary
      run: |
        Write-Host "`n================================" -ForegroundColor Cyan
        Write-Host "✓ RELEASE COMPLETED SUCCESSFULLY" -ForegroundColor Green
        Write-Host "================================`n" -ForegroundColor Cyan
        Write-Host "Release tag: ${{ github.ref_name }}" -ForegroundColor Gray
        Write-Host "Installer: ${{ steps.list-artifacts.outputs.installer-name }}" -ForegroundColor Gray
        Write-Host "Portable: ${{ steps.list-artifacts.outputs.portable-name }}" -ForegroundColor Gray
        Write-Host "`nView release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" -ForegroundColor Cyan
      shell: pwsh
